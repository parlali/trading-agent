name: Deploy MT5 Worker

on:
    push:
        branches: [main]
        paths:
            - "apps/mt5-worker/**"
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to Windows VM
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.MT5_WORKER_VM_HOST }}
                  port: ${{ secrets.MT5_WORKER_VM_PORT }}
                  username: ${{ secrets.VM_USER }}
                  password: ${{ secrets.VM_PASSWORD }}
                  command_timeout: 10m
                  script: |
                      $repoDir = "${{ secrets.MT5_WORKER_REPO_DIR }}"
                      if (-not $repoDir) {
                          Write-Host "FATAL: MT5_WORKER_REPO_DIR is not configured"
                          exit 1
                      }

                      Write-Host "========== DEPLOY START =========="
                      Write-Host "Timestamp: $(Get-Date)"

                      Write-Host ""
                      Write-Host "--- Step 1: Navigate to repo ---"
                      Set-Location $repoDir

                      Write-Host ""
                      Write-Host "--- Step 2: Current revision before pull ---"
                      git rev-parse --short HEAD 2>&1 | Out-String | Write-Host

                      Write-Host ""
                      Write-Host "--- Step 3: Git pull ---"
                      git pull 2>&1 | Out-String | Write-Host
                      if ($LASTEXITCODE -ne 0) {
                          Write-Host "FATAL: git pull failed with exit code $LASTEXITCODE"
                          exit 1
                      }
                      Write-Host "Git pull succeeded"
                      git rev-parse --short HEAD 2>&1 | Out-String | Write-Host

                      Write-Host ""
                      Write-Host "--- Step 4: Check NSSM exists ---"
                      $nssm = Get-Command nssm -ErrorAction SilentlyContinue
                      if (-not $nssm) {
                          Write-Host "FATAL: nssm not found in PATH"
                          exit 1
                      }

                      Write-Host ""
                      Write-Host "--- Step 5: Check required private MT5 files ---"
                      $serversDatPath = Join-Path $repoDir "private\mt5-worker\servers.dat"
                      if (-not (Test-Path $serversDatPath)) {
                          Write-Host "FATAL: missing required private MT5 server database"
                          exit 1
                      }
                      Write-Host "Found required private MT5 server database"

                      Write-Host ""
                      Write-Host "--- Step 6: Service status before restart ---"
                      nssm status trading-mt5-worker 2>&1 | Out-String | Write-Host

                      Write-Host ""
                      Write-Host "--- Step 7: Restart service ---"
                      nssm restart trading-mt5-worker 2>&1 | Out-String | Write-Host
                      if ($LASTEXITCODE -ne 0) {
                          Write-Host "WARNING: nssm restart exited $LASTEXITCODE, trying stop then start"
                          nssm stop trading-mt5-worker 2>&1 | Out-String | Write-Host
                          Start-Sleep -Seconds 3
                          nssm start trading-mt5-worker 2>&1 | Out-String | Write-Host
                          if ($LASTEXITCODE -ne 0) {
                              Write-Host "FATAL: Could not start trading-mt5-worker"
                              exit 1
                          }
                      }

                      Write-Host ""
                      Write-Host "--- Step 8: Verify service is running ---"
                      Start-Sleep -Seconds 5
                      $serviceStatus = (nssm status trading-mt5-worker 2>&1 | Out-String).Trim()
                      Write-Host $serviceStatus
                      if ($serviceStatus -notmatch "SERVICE_RUNNING") {
                          Write-Host "FATAL: trading-mt5-worker is not running after restart"
                          exit 1
                      }

                      Write-Host ""
                      Write-Host "--- Step 9: Health endpoint ---"
                      $envPath = Join-Path $repoDir "apps\mt5-worker\.env"
                      if (-not (Test-Path $envPath)) {
                          Write-Host "FATAL: missing MT5 worker .env file"
                          exit 1
                      }

                      $workerAccessKeyLine = Get-Content $envPath | Where-Object {
                          $line = $_.Trim()
                          $line -and -not $line.StartsWith("#") -and $line -match "^\s*WORKER_ACCESS_KEY\s*="
                      } | Select-Object -Last 1
                      $workerAccessKey = ""
                      if ($workerAccessKeyLine) {
                          $workerAccessKey = ($workerAccessKeyLine -replace "^\s*WORKER_ACCESS_KEY\s*=\s*", "").Trim().Trim('"').Trim("'")
                      }
                      if (-not $workerAccessKey) {
                          Write-Host "FATAL: WORKER_ACCESS_KEY is not configured in MT5 worker .env"
                          exit 1
                      }

                      $headers = @{ "x-worker-key" = $workerAccessKey }
                      $healthOk = $false
                      for ($attempt = 1; $attempt -le 10; $attempt++) {
                          try {
                              $r = Invoke-WebRequest -Uri "http://localhost:8090/health" -Headers $headers -UseBasicParsing -TimeoutSec 10
                              $body = $r.Content | ConvertFrom-Json
                              Write-Host "Health check HTTP status: $($r.StatusCode)"
                              Write-Host "Health check worker status: $($body.status)"
                              if ($r.StatusCode -eq 200 -and $body.status -eq "ok") {
                                  $healthOk = $true
                                  break
                              }
                          } catch {
                              Write-Host "Health check attempt $attempt failed: $($_.Exception.Message)"
                          }
                          Start-Sleep -Seconds 3
                      }

                      if (-not $healthOk) {
                          Write-Host "FATAL: MT5 worker health check failed"
                          exit 1
                      }

                      Write-Host ""
                      Write-Host "========== DEPLOY COMPLETE =========="
                      Write-Host "Timestamp: $(Get-Date)"
                      exit 0
