name: Deploy MT5 Worker

on:
    push:
        branches: [main]
        paths:
            - "apps/mt5-worker/**"
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to Windows VM
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.MT5_WORKER_VM_HOST }}
                  port: 2227
                  username: ${{ secrets.VM_USER }}
                  password: ${{ secrets.VM_PASSWORD }}
                  command_timeout: 10m
                  script: |
                      $ErrorActionPreference = 'Stop'

                      Write-Host "========== DEPLOY START =========="
                      Write-Host "Timestamp: $(Get-Date)"
                      Write-Host "User: $env:USERNAME"

                      Write-Host ""
                      Write-Host "--- Step 1: Navigate to repo ---"
                      Set-Location "${{ secrets.MT5_WORKER_REPO_DIR }}"
                      Write-Host "Current directory: $(Get-Location)"

                      Write-Host ""
                      Write-Host "--- Step 2: Git status before pull ---"
                      git status
                      git log --oneline -3

                      Write-Host ""
                      Write-Host "--- Step 3: Git pull ---"
                      git pull
                      if ($LASTEXITCODE -ne 0) {
                          Write-Host "FATAL: git pull failed with exit code $LASTEXITCODE"
                          exit 1
                      }
                      Write-Host "Git pull succeeded"
                      git log --oneline -3

                      Write-Host ""
                      Write-Host "--- Step 4: Check NSSM exists ---"
                      $nssm = Get-Command nssm -ErrorAction SilentlyContinue
                      if (-not $nssm) {
                          Write-Host "FATAL: nssm not found in PATH: $env:PATH"
                          exit 1
                      }
                      Write-Host "nssm found at: $($nssm.Source)"

                      Write-Host ""
                      Write-Host "--- Step 5: Service status before restart ---"
                      nssm status trading-mt5-worker

                      Write-Host ""
                      Write-Host "--- Step 6: Restart service ---"
                      nssm restart trading-mt5-worker
                      if ($LASTEXITCODE -ne 0) {
                          Write-Host "WARNING: nssm restart exited $LASTEXITCODE, trying stop then start"
                          nssm stop trading-mt5-worker
                          Start-Sleep -Seconds 3
                          nssm start trading-mt5-worker
                          if ($LASTEXITCODE -ne 0) {
                              Write-Host "FATAL: Could not start trading-mt5-worker"
                              exit 1
                          }
                      }

                      Write-Host ""
                      Write-Host "--- Step 7: Verify service is running ---"
                      Start-Sleep -Seconds 5
                      nssm status trading-mt5-worker

                      Write-Host ""
                      Write-Host "--- Step 8: Health endpoint ---"
                      Start-Sleep -Seconds 3
                      try {
                          $r = Invoke-WebRequest -Uri "http://localhost:8090/health" -UseBasicParsing
                          Write-Host "Health check HTTP status: $($r.StatusCode)"
                      } catch {
                          Write-Host "Health check failed: $_"
                      }

                      Write-Host ""
                      Write-Host "--- Step 9: Log paths ---"
                      nssm get trading-mt5-worker AppStdout
                      nssm get trading-mt5-worker AppStderr

                      Write-Host ""
                      Write-Host "========== DEPLOY COMPLETE =========="
                      Write-Host "Timestamp: $(Get-Date)"
