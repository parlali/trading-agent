name: Deploy MT5 Worker

on:
    push:
        branches: [main]
        paths:
            - "apps/mt5-worker/**"
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to Windows VM
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.MT5_WORKER_VM_HOST }}
                  port: ${{ secrets.MT5_WORKER_VM_PORT }}
                  username: ${{ secrets.VM_USER }}
                  password: ${{ secrets.VM_PASSWORD }}
                  command_timeout: 10m
                  script: |
                      $repoDir = "${{ secrets.MT5_WORKER_REPO_DIR }}"
                      if (-not $repoDir) {
                          Write-Host "FATAL: MT5_WORKER_REPO_DIR is not configured"
                          exit 1
                      }

                      Write-Host "========== DEPLOY START =========="
                      Write-Host "Timestamp: $(Get-Date)"
                      Write-Host "User: $env:USERNAME"

                      Write-Host ""
                      Write-Host "--- Step 1: Navigate to repo ---"
                      Set-Location $repoDir
                      Write-Host "Current directory: $(Get-Location)"

                      Write-Host ""
                      Write-Host "--- Step 2: Git status before pull ---"
                      git status 2>&1 | Out-String | Write-Host
                      git log --oneline -3 2>&1 | Out-String | Write-Host

                      Write-Host ""
                      Write-Host "--- Step 3: Git pull ---"
                      git pull 2>&1 | Out-String | Write-Host
                      if ($LASTEXITCODE -ne 0) {
                          Write-Host "FATAL: git pull failed with exit code $LASTEXITCODE"
                          exit 1
                      }
                      Write-Host "Git pull succeeded"
                      git log --oneline -3 2>&1 | Out-String | Write-Host

                      Write-Host ""
                      Write-Host "--- Step 4: Check NSSM exists ---"
                      $nssm = Get-Command nssm -ErrorAction SilentlyContinue
                      if (-not $nssm) {
                          Write-Host "FATAL: nssm not found in PATH: $env:PATH"
                          exit 1
                      }
                      Write-Host "nssm found at: $($nssm.Source)"

                      Write-Host ""
                      Write-Host "--- Step 5: Check required private MT5 files ---"
                      $serversDatPath = Join-Path $repoDir "private\mt5-worker\servers.dat"
                      if (-not (Test-Path $serversDatPath)) {
                          Write-Host "FATAL: missing required private MT5 server database at private\mt5-worker\servers.dat"
                          exit 1
                      }
                      Write-Host "Found required private MT5 server database"

                      Write-Host ""
                      Write-Host "--- Step 6: Service status before restart ---"
                      nssm status trading-mt5-worker 2>&1 | Out-String | Write-Host

                      Write-Host ""
                      Write-Host "--- Step 7: Restart service ---"
                      nssm restart trading-mt5-worker 2>&1 | Out-String | Write-Host
                      if ($LASTEXITCODE -ne 0) {
                          Write-Host "WARNING: nssm restart exited $LASTEXITCODE, trying stop then start"
                          nssm stop trading-mt5-worker 2>&1 | Out-String | Write-Host
                          Start-Sleep -Seconds 3
                          nssm start trading-mt5-worker 2>&1 | Out-String | Write-Host
                          if ($LASTEXITCODE -ne 0) {
                              Write-Host "FATAL: Could not start trading-mt5-worker"
                              exit 1
                          }
                      }

                      Write-Host ""
                      Write-Host "--- Step 8: Verify service is running ---"
                      Start-Sleep -Seconds 5
                      nssm status trading-mt5-worker 2>&1 | Out-String | Write-Host

                      Write-Host ""
                      Write-Host "--- Step 9: Health endpoint ---"
                      Start-Sleep -Seconds 3
                      try {
                          $r = Invoke-WebRequest -Uri "http://localhost:8090/health" -UseBasicParsing
                          Write-Host "Health check HTTP status: $($r.StatusCode)"
                      } catch {
                          Write-Host "Health check failed: $_"
                      }

                      Write-Host ""
                      Write-Host "--- Step 10: Log paths ---"
                      nssm get trading-mt5-worker AppStdout 2>&1 | Out-String | Write-Host
                      nssm get trading-mt5-worker AppStderr 2>&1 | Out-String | Write-Host

                      Write-Host ""
                      Write-Host "========== DEPLOY COMPLETE =========="
                      Write-Host "Timestamp: $(Get-Date)"
                      exit 0
