name: Deploy Convex

on:
    push:
        branches: [main]
        paths:
            - "packages/convex/**"

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Deploy Convex
              run: bunx convex deploy
              working-directory: packages/convex
              env:
                  CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
